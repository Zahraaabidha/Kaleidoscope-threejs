<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Kaleidoscope</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050505;
    --border: rgba(255,255,255,0.09);
    --muted: rgba(255,255,255,0.45);
    --accent: #E8704E;
  }

  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg);
    font-family: 'Inter', system-ui, -apple-system, sans-serif; color: #fff;
    -webkit-font-smoothing: antialiased; }

  #scene { position: fixed; inset: 0; display: block; opacity: 0;
    transform: scale(1.06); will-change: transform, opacity; }

  /* ── HUD ────────────────────────────────────────────────── */
  #hud-bottom { position: fixed; left: 0; right: 0; bottom: 0; z-index: 10; pointer-events: none;
    padding: clamp(16px,2.4vw,30px); display: flex; align-items: flex-end; justify-content: space-between;
    gap: 16px; opacity: 0; transform: translateY(14px); }
  .hud-hint { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; line-height: 1.7; }
  .hud-hint b { color: rgba(255,255,255,0.8); font-weight: 600; }
  #stat { font-size: 11px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase;
    font-variant-numeric: tabular-nums; text-align: right; }
  #stat #mode-name { color: var(--accent); font-weight: 600; }

  /* ── Tweakpane container ────────────────────────────────── */
  #tp { position: fixed; top: clamp(14px,2vw,24px); right: clamp(14px,2vw,24px);
    width: 286px; z-index: 50; opacity: 0; transform: translateX(40px);
    will-change: transform, opacity; max-height: calc(100vh - 48px); overflow-y: auto;
    --tp-base-background-color: rgba(18,18,20,0.82);
    --tp-base-shadow-color: rgba(0,0,0,0.4);
    --tp-button-background-color: rgba(232,112,78,0.85);
    --tp-button-background-color-hover: rgba(232,112,78,1);
    --tp-button-background-color-active: rgba(232,112,78,1);
    --tp-button-foreground-color: #fff;
    --tp-container-background-color: rgba(255,255,255,0.03);
    --tp-container-background-color-hover: rgba(255,255,255,0.07);
    --tp-input-background-color: rgba(255,255,255,0.08);
    --tp-input-background-color-hover: rgba(255,255,255,0.12);
    --tp-input-foreground-color: #fff;
    --tp-label-foreground-color: rgba(255,255,255,0.6);
    --tp-groove-foreground-color: rgba(232,112,78,0.5);
  }
  #tp::-webkit-scrollbar { width: 5px; }
  #tp::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 5px; }
  #tp .tp-rotv { backdrop-filter: blur(28px) saturate(1.5); -webkit-backdrop-filter: blur(28px) saturate(1.5);
    border-radius: 14px; box-shadow: 0 24px 80px -20px rgba(0,0,0,0.8); border: 1px solid var(--border); }

  /* ── Floating buttons ───────────────────────────────────── */
  .fab { position: fixed; z-index: 60; width: 46px; height: 46px; border-radius: 50%;
    background: rgba(255,255,255,0.07); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    border: 1px solid var(--border); cursor: pointer; color: #fff; display: flex;
    align-items: center; justify-content: center; opacity: 0; transition: background .2s, transform .2s; }
  .fab:hover { background: rgba(255,255,255,0.14); transform: scale(1.06); }
  .fab svg { width: 18px; height: 18px; }
  #fab-panel { right: clamp(14px,2.2vw,28px); bottom: clamp(14px,2.2vw,28px); }
  #fab-shot  { right: clamp(72px,2.2vw,86px); bottom: clamp(14px,2.2vw,28px); }

  /* ── Toast / Flash ──────────────────────────────────────── */
  #toast { position: fixed; left: 50%; bottom: 90px; transform: translateX(-50%) translateY(20px);
    background: rgba(20,20,22,0.92); backdrop-filter: blur(20px); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 20px; font-size: 12px; letter-spacing: 0.04em; color: #fff;
    z-index: 120; opacity: 0; pointer-events: none; max-width: 80vw; text-align: center; }
  #flash { position: fixed; inset: 0; z-index: 300; background: #fff; opacity: 0; pointer-events: none; }

  @media (max-width: 640px) {
    #tp { width: calc(100vw - 28px); top: auto; bottom: 76px; right: 14px; }
  }
</style>
</head>
<body>

<canvas id="scene"></canvas>

<div id="flash"></div>

<div id="hud-bottom">
  <span class="hud-hint"><b>Move</b> drift · <b>Drag</b> spin · <b>Scroll</b> zoom · <b>C</b> controls</span>
  <span id="stat"><span id="fps">60</span> FPS · <span id="mode-name">LIQUID</span></span>
</div>

<button id="fab-shot" class="fab" title="Save frame (P)" aria-label="Screenshot">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
</button>
<button id="fab-panel" class="fab" title="Controls (C)" aria-label="Controls">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/>
    <line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/>
    <line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
</button>

<div id="toast"></div>
<div id="tp"></div>

<!-- Libs -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "tweakpane": "https://cdn.jsdelivr.net/npm/tweakpane@4.0.5/dist/tweakpane.min.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { Pane } from 'tweakpane';

// ════════════════════════════════════════════════════════════════════════════
//  PALETTES — a + b·cos(2π(c·t + d))
// ════════════════════════════════════════════════════════════════════════════
const PALETTES = [
  { name:'Spectrum', a:[0.5,0.5,0.5], b:[0.5,0.5,0.5], c:[1.0,1.0,1.0], d:[0.00,0.33,0.67] },
  { name:'Neon',     a:[0.6,0.5,0.6], b:[0.5,0.5,0.5], c:[1.0,1.0,1.0], d:[0.30,0.20,0.55] },
  { name:'Plasma',   a:[0.7,0.4,0.5], b:[0.5,0.5,0.5], c:[1.0,1.0,1.0], d:[0.80,0.90,0.30] },
  { name:'Ice',      a:[0.4,0.5,0.7], b:[0.3,0.4,0.5], c:[1.0,1.0,0.8], d:[0.10,0.20,0.35] },
  { name:'Emerald',  a:[0.3,0.6,0.4], b:[0.4,0.5,0.4], c:[1.0,1.2,0.8], d:[0.10,0.55,0.25] },
  { name:'Sunset',   a:[0.8,0.5,0.4], b:[0.4,0.4,0.3], c:[1.0,1.0,0.6], d:[0.00,0.15,0.45] },
  { name:'Magma',    a:[0.7,0.35,0.2],b:[0.5,0.4,0.3], c:[1.0,1.0,1.0], d:[0.00,0.10,0.20] },
  { name:'Royal',    a:[0.5,0.3,0.7], b:[0.4,0.3,0.5], c:[1.0,1.0,1.0], d:[0.55,0.70,0.95] },
  { name:'Aqua',     a:[0.2,0.6,0.7], b:[0.3,0.4,0.4], c:[0.8,1.0,1.0], d:[0.20,0.35,0.50] },
  { name:'Candy',    a:[0.9,0.5,0.7], b:[0.4,0.4,0.4], c:[1.0,1.0,1.0], d:[0.10,0.45,0.80] },
  { name:'Toxic',    a:[0.5,0.6,0.2], b:[0.5,0.4,0.3], c:[1.2,1.0,0.7], d:[0.30,0.55,0.10] },
  { name:'Mono',     a:[0.6,0.6,0.65],b:[0.4,0.4,0.45],c:[1.0,1.0,1.0], d:[0.00,0.05,0.10] },
];

// ════════════════════════════════════════════════════════════════════════════
//  SHADERS
// ════════════════════════════════════════════════════════════════════════════
const VERT = `varying vec2 vUv; void main(){ vUv = uv; gl_Position = vec4(position, 1.0); }`;

const FRAG = `
precision highp float;
varying vec2 vUv;

uniform vec2  uRes;
uniform float uTime;
uniform float uSegments;
uniform float uRotation;
uniform float uZoom;
uniform float uScale;
uniform float uHue;
uniform float uFlow;
uniform float uGlow;
uniform float uLayers;
uniform int   uMode;
uniform vec2  uOffset;
uniform vec2  uParallax;
uniform vec3  uPalA, uPalB, uPalC, uPalD;

const float TAU = 6.28318530718;

float hash1(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453); }
vec2  hash2(vec2 p){ return fract(sin(vec2(dot(p,vec2(127.1,311.7)), dot(p,vec2(269.5,183.3)))) * 43758.5453); }

vec3 palette(float t){ return uPalA + uPalB * cos(TAU * (uPalC * t + uPalD + uHue)); }

float vnoise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  vec2 u = f*f*(3.0-2.0*f);
  return mix(mix(hash1(i), hash1(i+vec2(1,0)), u.x),
             mix(hash1(i+vec2(0,1)), hash1(i+vec2(1,1)), u.x), u.y);
}
float fbm(vec2 p){
  float v=0.0, a=0.5;
  for(int i=0;i<5;i++){ v += a*vnoise(p); p = mat2(1.6,1.2,-1.2,1.6)*p; a*=0.5; }
  return v;
}

// animated voronoi → returns F1; outputs F2, cellId, and pixel→cell vector
float voronoi(vec2 p, out float f2, out float id, out vec2 dir){
  vec2 n = floor(p), f = fract(p);
  float f1 = 8.0; f2 = 8.0; id = 0.0; dir = vec2(0.0);
  for(int j=-1;j<=1;j++)
  for(int i=-1;i<=1;i++){
    vec2 g = vec2(float(i), float(j));
    vec2 o = hash2(n+g);
    o = 0.5 + 0.5*sin(uTime*0.5 + TAU*o);
    vec2 r = g + o - f;
    float d = dot(r,r);
    if(d < f1){ f2=f1; f1=d; id=hash1(n+g); dir=r; }
    else if(d < f2){ f2=d; }
  }
  return sqrt(f1);
}

// ── PRISM: faceted 3D cut-glass gems with specular lighting ──
vec3 crystal(vec2 uv){
  float f2, id; vec2 dir;
  float f1 = voronoi(uv, f2, id, dir);
  float edge  = sqrt(f2) - f1;
  float bevel = smoothstep(0.0, 0.26, edge);           // 0 at crack → 1 cell centre
  // faceted normal — each cell tilts like a cut gem face
  vec3 nor = normalize(vec3(dir * 2.8 * (1.0 - bevel*0.6), 0.7));
  vec3 L = normalize(vec3(0.55, 0.65, 0.92));
  vec3 V = vec3(0.0, 0.0, 1.0);
  vec3 H = normalize(L + V);
  float diff = max(dot(nor, L), 0.0);                   // full lambert → dark unlit facets
  float spec = pow(max(dot(nor, H), 0.0), 40.0);        // tight glassy highlight
  float fres = pow(1.0 - max(dot(nor, V), 0.0), 3.0);   // edge rim light
  vec3 base = palette(id*0.85 + length(uv)*0.06 + uTime*0.03);
  vec3 col = base * (0.07 + 0.85*diff) * bevel;         // saturated faces, dark cracks
  col += base * spec * 1.1 * bevel * uGlow;             // colored sparkle (keeps hue)
  col += vec3(1.0) * spec * spec * 0.6 * bevel * uGlow; // white hot core of sparkle
  col += palette(id + 0.45) * fres * 0.45 * bevel;      // prismatic rim
  float glint = smoothstep(0.13, 0.0, f1);
  col += palette(id + 0.2) * pow(glint, 2.2) * 0.7 * uGlow;
  return col;
}

// ── FLOWER: glowing petals + rings, luminous core ──
vec3 flower(vec2 uv){
  float r = length(uv);
  float a = atan(uv.y, uv.x);
  float petals = 0.5 + 0.5*sin(a*uSegments*0.5 + sin(r*5.0 - uTime*1.1));
  float rings  = 0.5 + 0.5*sin(r*uScale*5.0 - uTime*1.5);
  float lines  = pow(petals, 5.0) * (0.2 + 0.8*pow(rings, 3.0));
  vec3 col = palette(r*0.5 - uTime*0.05 + a/TAU) * lines * 1.2;
  col += palette(uTime*0.1) * exp(-r*r*18.0) * 1.0 * uGlow;
  // soft 3D shading from radial gradient
  float sh = 0.6 + 0.4*sin(a*uSegments + r*8.0 - uTime);
  col *= 0.7 + 0.3*sh;
  return col;
}

// ── LIQUID: domain-warped flowing metal with sheen ──
vec3 liquid(vec2 uv){
  vec2 p = uv*uScale;
  float t = uTime*uFlow*0.4;
  vec2 q = vec2(fbm(p + t), fbm(p + vec2(5.2,1.3) - t));
  vec2 rr = vec2(fbm(p + 2.0*q + vec2(1.7,9.2) + t*0.5), fbm(p + 2.0*q + vec2(8.3,2.8) - t*0.5));
  float f = fbm(p + 3.0*rr);
  float fx = fbm(p + 3.0*rr + vec2(0.06,0.0));
  float fy = fbm(p + 3.0*rr + vec2(0.0,0.06));
  vec3 nor = normalize(vec3((f-fx)*8.0, (f-fy)*8.0, 1.0));   // height-field normal
  vec3 L = normalize(vec3(0.5, 0.6, 0.8));
  float diff = max(dot(nor,L), 0.0);
  float spec = pow(max(dot(nor, normalize(L+vec3(0,0,1))),0.0), 28.0);
  float band = pow(f, 2.0);
  vec3 col = palette(f + length(q)*0.5 + uTime*0.04) * (0.1 + band*1.3) * (0.3 + 0.7*diff);
  col += palette(f+0.4) * spec * 0.9 * uGlow;
  return col;
}

vec2 kaleido(vec2 uv, float seg){
  float a = atan(uv.y, uv.x);
  float r = length(uv);
  float s = TAU / seg;
  a = mod(a, s);
  a = abs(a - s*0.5);
  return vec2(cos(a), sin(a)) * r;
}

vec3 sampleMode(vec2 k){
  if(uMode == 0) return crystal(k * uScale);
  if(uMode == 1) return flower(k);
  return liquid(k);
}

void main(){
  vec2 uv = (vUv - 0.5);
  uv.x *= uRes.x / uRes.y;
  uv = uv / uZoom + uOffset;

  float c = cos(uRotation), s = sin(uRotation);
  uv = mat2(c, -s, s, c) * uv;

  vec2 k = kaleido(uv, uSegments);

  // multi-octave depth with inter-layer PARALLAX (closer layers shift more) → 3D
  vec3 col = vec3(0.0);
  float wsum = 0.0;
  float fz = fract(uTime * uFlow * 0.12);
  for(int i=0;i<5;i++){
    if(float(i) >= uLayers) break;
    float fi = float(i) - fz;
    float sc = exp2(fi * 0.6);
    vec2 par = uParallax * (float(i)+1.0) * 0.06;
    float w = sin(3.14159 * (float(i)+0.5) / max(uLayers,1.0));
    w = max(w, 0.0001);
    col += sampleMode(k * sc + par) * w;
    wsum += w;
  }
  col /= max(wsum, 0.001);

  float r = length(uv);
  col += palette(uTime*0.03) * 0.02 * smoothstep(0.25, 0.0, r);

  gl_FragColor = vec4(col, 1.0);
}
`;

const PostShader = {
  uniforms: {
    tDiffuse:  { value: null },
    uDisp:     { value: 0.55 },
    uVignette: { value: 0.6 },
    uGrain:    { value: 0.04 },
    uSat:      { value: 1.18 },
    uTime:     { value: 0 },
    uRes:      { value: new THREE.Vector2(1,1) },
  },
  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader: `
    precision highp float;
    varying vec2 vUv;
    uniform sampler2D tDiffuse;
    uniform float uDisp, uVignette, uGrain, uSat, uTime;
    uniform vec2 uRes;
    float hash(vec2 p){ return fract(sin(dot(p, vec2(12.9898,78.233)))*43758.5453); }
    void main(){
      vec2 uv = vUv;
      vec2 dir = uv - 0.5;
      float d = length(dir);
      vec2 off = dir * d * uDisp * 0.05;
      vec3 col;
      col.r = texture2D(tDiffuse, uv - off).r;
      col.g = texture2D(tDiffuse, uv).g;
      col.b = texture2D(tDiffuse, uv + off).b;
      // saturation + gentle contrast for vividness
      float luma = dot(col, vec3(0.299, 0.587, 0.114));
      col = mix(vec3(luma), col, uSat);
      col = (col - 0.5) * 1.04 + 0.5;
      // vignette
      float vig = smoothstep(0.95, 0.25, d);
      col *= mix(1.0, vig, uVignette);
      // film grain
      col += (hash(uv*uRes + fract(uTime)*100.0) - 0.5) * uGrain;
      gl_FragColor = vec4(max(col, 0.0), 1.0);
    }
  `,
};

// ════════════════════════════════════════════════════════════════════════════
//  THREE SETUP
// ════════════════════════════════════════════════════════════════════════════
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance', preserveDrawingBuffer: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.75));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.92;

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

const uniforms = {
  uRes:      { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
  uTime:     { value: 0 },
  uSegments: { value: 14 },
  uRotation: { value: 0 },
  uZoom:     { value: 0.2 },
  uScale:    { value: 3.6 },
  uHue:      { value: 0 },
  uFlow:     { value: 0.4 },
  uGlow:     { value: 1.0 },
  uLayers:   { value: 2 },
  uMode:     { value: 2 },
  uOffset:   { value: new THREE.Vector2(0,0) },
  uParallax: { value: new THREE.Vector2(0,0) },
  uPalA: { value: new THREE.Vector3(...PALETTES[3].a) },
  uPalB: { value: new THREE.Vector3(...PALETTES[3].b) },
  uPalC: { value: new THREE.Vector3(...PALETTES[3].c) },
  uPalD: { value: new THREE.Vector3(...PALETTES[3].d) },
};

scene.add(new THREE.Mesh(
  new THREE.PlaneGeometry(2, 2),
  new THREE.ShaderMaterial({ vertexShader: VERT, fragmentShader: FRAG, uniforms })
));

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.95, 0.55, 0.55);
composer.addPass(bloom);
const postPass = new ShaderPass(PostShader);
postPass.uniforms.uRes.value.set(window.innerWidth, window.innerHeight);
composer.addPass(postPass);
composer.addPass(new OutputPass());

function resize(){
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h); composer.setSize(w, h);
  uniforms.uRes.value.set(w, h);
  postPass.uniforms.uRes.value.set(w, h);
  bloom.resolution.set(w, h);
}
window.addEventListener('resize', resize);

// ════════════════════════════════════════════════════════════════════════════
//  INTERACTION — pointer position gently drifts the kaleidoscope
// ════════════════════════════════════════════════════════════════════════════
let spinVel = 0, dragging = false, lastX = 0;
let panX = 0, panY = 0;        // eased pattern offset (drift)
let panTX = 0, panTY = 0;      // drift target from pointer position
let paraTX = 0, paraTY = 0;    // parallax (3D tilt) target from pointer
const DRIFT_EASE = 0.04;       // how gently the image follows the cursor
const TIME_SCALE = 0.8;        // global animation speed (lower = calmer)

canvas.addEventListener('pointerdown', e => { dragging = true; lastX = e.clientX; canvas.setPointerCapture(e.pointerId); });
canvas.addEventListener('pointerup',   () => { dragging = false; });
canvas.addEventListener('pointermove', e => {
  // mouse position drives a smooth drift + 3D tilt of the pattern
  const hx = e.clientX / window.innerWidth  - 0.5;
  const hy = e.clientY / window.innerHeight - 0.5;
  panTX  = hx * -0.6;
  panTY  = hy *  0.6;
  paraTX = hx *  2.0;
  paraTY = hy *  2.0;
  if(!dragging) return;
  spinVel += (e.clientX - lastX) * 0.00015;
  lastX = e.clientX;
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  params.zoom = THREE.MathUtils.clamp(uniforms.uZoom.value - e.deltaY * 0.0012, 0.2, 4.0);
  uniforms.uZoom.value = params.zoom;
  if(zoomBinding) zoomBinding.refresh();
}, { passive: false });

// ════════════════════════════════════════════════════════════════════════════
//  TWEAKPANE CONTROLS
// ════════════════════════════════════════════════════════════════════════════
const params = {
  segments: 14, spin: 0.2, zoom: 0.2, flow: 0.4,
  mode: 2, detail: 3.6, layers: 2, colorCycle: 0, palette: 3,
  bloom: 0.95, dispersion: 0.55, vignette: 0.6, grain: 0.04, saturation: 1.28,
};
const fpsObj = { fps: 60 };
const MODE_NAMES = ['PRISM','FLOWER','LIQUID'];

const pane = new Pane({ container: document.getElementById('tp'), title: 'Kaleidoscope' });
let zoomBinding = null;

const fPerf = pane.addFolder({ title: 'Performance', expanded: true });
fPerf.addBinding(fpsObj, 'fps', { readonly: true, format: v => v.toFixed(0) + ' fps' });

const fGeo = pane.addFolder({ title: 'Geometry', expanded: true });
fGeo.addBinding(params, 'segments', { min: 3, max: 40, step: 1, label: 'Segments' }).on('change', e => uniforms.uSegments.value = e.value);
fGeo.addBinding(params, 'spin', { min: -2, max: 2, step: 0.01, label: 'Spin' }).on('change', e => spinTarget = e.value);
zoomBinding = fGeo.addBinding(params, 'zoom', { min: 0.2, max: 4, step: 0.01, label: 'Zoom' }).on('change', e => uniforms.uZoom.value = e.value);
fGeo.addBinding(params, 'flow', { min: 0, max: 2, step: 0.01, label: 'Flow' }).on('change', e => uniforms.uFlow.value = e.value);

const fPat = pane.addFolder({ title: 'Pattern', expanded: true });
fPat.addBinding(params, 'mode', { label: 'Mode', options: { Prism: 0, Flower: 1, Liquid: 2 } }).on('change', e => {
  uniforms.uMode.value = e.value; document.getElementById('mode-name').textContent = MODE_NAMES[e.value];
});
fPat.addBinding(params, 'detail', { min: 1, max: 8, step: 0.1, label: 'Detail' }).on('change', e => uniforms.uScale.value = e.value);
fPat.addBinding(params, 'layers', { min: 1, max: 5, step: 1, label: 'Depth' }).on('change', e => uniforms.uLayers.value = e.value);
fPat.addBinding(params, 'colorCycle', { min: 0, max: 1, step: 0.01, label: 'Color' }).on('change', e => uniforms.uHue.value = e.value);
const palOpts = {}; PALETTES.forEach((p,i)=> palOpts[p.name] = i);
fPat.addBinding(params, 'palette', { label: 'Palette', options: palOpts }).on('change', e => setPalette(e.value));

const fFx = pane.addFolder({ title: 'Cinematic Post', expanded: false });
fFx.addBinding(params, 'bloom', { min: 0, max: 2.5, step: 0.01, label: 'Bloom' }).on('change', e => bloom.strength = e.value);
fFx.addBinding(params, 'dispersion', { min: 0, max: 2, step: 0.01, label: 'Dispersion' }).on('change', e => postPass.uniforms.uDisp.value = e.value);
fFx.addBinding(params, 'saturation', { min: 0, max: 2, step: 0.01, label: 'Saturation' }).on('change', e => postPass.uniforms.uSat.value = e.value);
fFx.addBinding(params, 'vignette', { min: 0, max: 1, step: 0.01, label: 'Vignette' }).on('change', e => postPass.uniforms.uVignette.value = e.value);
fFx.addBinding(params, 'grain', { min: 0, max: 0.3, step: 0.005, label: 'Grain' }).on('change', e => postPass.uniforms.uGrain.value = e.value);

const fAct = pane.addFolder({ title: 'Actions', expanded: false });
fAct.addButton({ title: 'Save Frame' }).on('click', takeShot);
fAct.addButton({ title: 'Reset View' }).on('click', resetView);

function setPalette(i){
  params.palette = (i + PALETTES.length) % PALETTES.length;
  const p = PALETTES[params.palette];
  uniforms.uPalA.value.set(...p.a); uniforms.uPalB.value.set(...p.b);
  uniforms.uPalC.value.set(...p.c); uniforms.uPalD.value.set(...p.d);
  pane.refresh();
}

// ════════════════════════════════════════════════════════════════════════════
//  PANEL TOGGLE + FABS
// ════════════════════════════════════════════════════════════════════════════
let panelOpen = false;
const tp = document.getElementById('tp');
const openPanel  = () => { panelOpen = true;  gsap.to(tp, { x: 0, opacity: 1, duration: 0.55, ease: 'power3.out' }); };
const closePanel = () => { panelOpen = false; gsap.to(tp, { x: 40, opacity: 0, duration: 0.4, ease: 'power3.in' }); };
document.getElementById('fab-panel').addEventListener('click', () => panelOpen ? closePanel() : openPanel());

let toastTimer;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  gsap.killTweensOf(t);
  gsap.fromTo(t, { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.4, ease: 'power3.out' });
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => gsap.to(t, { opacity: 0, y: 20, duration: 0.4 }), 2600);
}

function takeShot(){
  composer.render();
  const flash = document.getElementById('flash');
  gsap.fromTo(flash, { opacity: 0.7 }, { opacity: 0, duration: 0.5, ease: 'power2.out' });
  requestAnimationFrame(() => {
    const a = document.createElement('a');
    a.href = renderer.domElement.toDataURL('image/png');
    a.download = `kaleidoscope-${Date.now()}.png`; a.click();
    toast('Frame saved');
  });
}
function resetView(){
  spinVel = 0; panX = panY = panTX = panTY = 0;
  uniforms.uZoom.value = 0.2; params.zoom = 0.2; uniforms.uRotation.value = 0;
  pane.refresh(); toast('View reset');
}
document.getElementById('fab-shot').addEventListener('click', takeShot);

// ════════════════════════════════════════════════════════════════════════════
//  AUTO-ROTATION
// ════════════════════════════════════════════════════════════════════════════
// continuous slow spin; magnitude is set by the Tweakpane "Spin" control
let spinTarget = 0.2;

// ════════════════════════════════════════════════════════════════════════════
//  KEYBOARD
// ════════════════════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if(k === 'c') panelOpen ? closePanel() : openPanel();
  if(k === 'p') takeShot();
  if(k === 'arrowright') setPalette(params.palette + 1);
  if(k === 'arrowleft')  setPalette(params.palette - 1);
  if(k === 'r') resetView();
});

// ════════════════════════════════════════════════════════════════════════════
//  RENDER LOOP
// ════════════════════════════════════════════════════════════════════════════
let fpsLast = performance.now(), fpsCount = 0, lastT = performance.now();
function tick(now){
  requestAnimationFrame(tick);
  const dt = Math.min((now - lastT)/1000, 0.05); lastT = now;

  fpsCount++;
  if(now - fpsLast >= 500){ fpsObj.fps = Math.round(fpsCount*1000/(now-fpsLast)); document.getElementById('fps').textContent = fpsObj.fps; fpsCount=0; fpsLast=now; }

  spinVel *= 0.94;
  uniforms.uRotation.value += (spinTarget * dt) + spinVel;

  // pointer position gently drifts the kaleidoscope centre
  panX += (panTX - panX) * DRIFT_EASE;
  panY += (panTY - panY) * DRIFT_EASE;
  uniforms.uOffset.value.set(panX, panY);

  // ease parallax (inter-layer 3D tilt) toward pointer target
  const para = uniforms.uParallax.value;
  para.x += (paraTX - para.x) * 0.05;
  para.y += (paraTY - para.y) * 0.05;

  const t = now / 1000 * TIME_SCALE;
  uniforms.uTime.value = t;
  postPass.uniforms.uTime.value = t;
  composer.render();
}
requestAnimationFrame(tick);

// ════════════════════════════════════════════════════════════════════════════
//  ENTRANCE — no preloader, just a quick reveal
// ════════════════════════════════════════════════════════════════════════════
gsap.to('#scene', { opacity: 1, scale: 1, duration: 1.2, ease: 'power2.out', delay: 0.1 });
gsap.to('#hud-bottom', { opacity: 1, y: 0, duration: 0.7, ease: 'power2.out', delay: 0.5 });
gsap.to('.fab', { opacity: 1, duration: 0.5, stagger: 0.08, ease: 'power2.out', delay: 0.6 });
gsap.set(tp, { x: 40, opacity: 0 });
gsap.to(tp, { x: 0, opacity: 1, duration: 0.6, ease: 'power3.out', delay: 0.8, onStart: () => { panelOpen = true; } });
fPerf.expanded = true;
</script>
</body>
</html>
